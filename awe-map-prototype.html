<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awe in Cambridge — Map Prototype</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── Tokens (from awe-atlas palette) ── */
:root {
  --ink:       #1c1914;
  --parchment: #f4f0e7;
  --linen:     #e3d4c5;
  --stone:     #b7aea2;
  --accent:    #8c4518;
  --muted:     #6b6259;

  /* Awe-type colors (WOL) */
  --c-nature:      #6a9e4f;
  --c-epiphany:    #6b5b8a;
  --c-collective:  #4a7a8a;
  --c-moral:       #c4a882;
  --c-visual:      #b05a3a;
  --c-life:        #888;
  --c-music:       #e07040;
  --c-vista:       #5890b8;

  /* Perception colors */
  --c-wonder:        #7a9e5f;
  --c-beauty:        #d4845a;
  --c-vastness:      #5890b8;
  --c-interconn:     #c4a882;
  --c-mystery:       #7a6aaa;

  /* Tension colors */
  --c-wild:      #4e8c4a;
  --c-impressive:#8c4518;
  --c-intimate:  #c4a882;
  --c-inclusive: #4a7a8a;
  --c-ornate:    #b05a3a;
  --c-novel:     #6b5b8a;
  --c-ordinary:  #888;
  --c-familiar:  #a88058;
  --c-expansive: #5890b8;
  --c-exclusive: #74120c;
  --c-curated:   #97ba74;
  --c-functional:#7a6e5f;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--parchment); color: var(--ink); font-family: 'Georgia', serif; }

/* ── Layout ── */
.app {
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-rows: 56px 1fr;
  height: 100vh;
}

/* ── Header ── */
header {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
  background: var(--parchment);
  border-bottom: 1px solid var(--linen);
}
header h1 { font-size: 20px; font-weight: 400; }
header h1 em { font-style: italic; color: var(--accent); }
header .sub { font-size: 12px; color: var(--stone); margin-left: auto; }

/* ── Sidebar ── */
.sidebar {
  overflow-y: auto;
  border-right: 1px solid var(--linen);
  background: var(--parchment);
  display: flex; flex-direction: column;
  gap: 0;
}

.sidebar-section {
  padding: 16px 18px;
  border-bottom: 1px solid var(--linen);
}

.sidebar-section h2 {
  font-size: 10px; letter-spacing: .3em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px; font-weight: normal;
  font-family: 'Courier New', monospace;
}

/* ── Color-by selector ── */
.color-by-select {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--linen); border-radius: 2px;
  background: white; color: var(--ink);
  font-size: 14px; font-family: inherit;
  cursor: pointer; outline: none;
}
.color-by-select:focus { border-color: var(--accent); }

/* ── Legend ── */
.legend { display: flex; flex-direction: column; gap: 6px; }
.legend-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; cursor: pointer; padding: 2px 4px; border-radius: 2px;
  transition: background .15s;
}
.legend-item:hover { background: var(--linen); }
.legend-item.dimmed { opacity: .35; }
.legend-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid rgba(0,0,0,.15);
}
.legend-label { flex: 1; }
.legend-count { font-size: 11px; color: var(--stone); font-family: 'Courier New', monospace; }

/* ── Point detail panel ── */
.detail-panel {
  padding: 14px 18px; flex: 1;
  font-size: 13px; line-height: 1.55;
  color: var(--muted);
}
.detail-panel.empty { display: flex; align-items: center; justify-content: center; text-align: center; font-style: italic; }
.detail-title { font-size: 16px; font-weight: bold; color: var(--ink); margin-bottom: 8px; line-height: 1.3; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
.tag {
  font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
  padding: 2px 7px; border-radius: 10px;
  background: var(--linen); color: var(--muted);
  font-family: 'Courier New', monospace;
}
.tag.highlight { background: var(--accent); color: white; }
.detail-desc { font-style: italic; color: var(--ink); margin-top: 8px; line-height: 1.6; font-size: 13px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.detail-cell { font-size: 11px; }
.detail-cell .k { color: var(--stone); font-family: 'Courier New', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; }
.detail-cell .v { color: var(--ink); }

/* ── Map ── */
#map { width: 100%; height: 100%; }
.leaflet-container { background: #e8e0d5; }

/* ── Awe marker ── */
.awe-marker {
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.7);
  transition: all .15s;
  cursor: pointer;
}
.awe-marker:hover { transform: scale(1.4); border-color: white; }

/* ── Stats bar ── */
.stats-bar {
  display: flex; gap: 12px; flex-wrap: wrap;
}
.stat { text-align: center; }
.stat-n { font-size: 22px; font-weight: 300; color: var(--accent); }
.stat-label { font-size: 10px; color: var(--stone); font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: .15em; }

/* ── Filter chips ── */
.filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  font-size: 11px; padding: 3px 9px; border-radius: 10px;
  border: 1px solid var(--linen); background: white;
  cursor: pointer; transition: all .15s;
  font-family: 'Courier New', monospace;
}
.chip:hover { border-color: var(--accent); }
.chip.active { background: var(--accent); color: white; border-color: var(--accent); }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>Awe in <em>Cambridge</em></h1>
    <span class="sub">Awe Atlas — Map Prototype</span>
  </header>

  <!-- ── Sidebar ── -->
  <div class="sidebar">

    <!-- Stats -->
    <div class="sidebar-section">
      <h2>Overview</h2>
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-n" id="stat-total">—</div>
          <div class="stat-label">spots</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="stat-visible">—</div>
          <div class="stat-label">visible</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="stat-awe-walks">—</div>
          <div class="stat-label">awe walks</div>
        </div>
      </div>
    </div>

    <!-- Color By -->
    <div class="sidebar-section">
      <h2>Color points by</h2>
      <select class="color-by-select" id="colorBy">
        <option value="wol">Way of Life (awe type)</option>
        <option value="perception">Perception quality</option>
        <option value="tension">Tension / atmosphere</option>
        <option value="rhythm">Temporal rhythm</option>
        <option value="experienced_where">Experienced where</option>
        <option value="potential">Temporal potential</option>
        <option value="affiliation">Contributor affiliation</option>
      </select>
    </div>

    <!-- Legend -->
    <div class="sidebar-section">
      <h2>Legend <span style="font-size:10px;font-weight:normal;color:var(--stone)">(click to filter)</span></h2>
      <div class="legend" id="legend"></div>
    </div>

    <!-- Quick filters -->
    <div class="sidebar-section">
      <h2>Quick filters</h2>
      <div style="margin-bottom:8px;">
        <div class="detail-cell"><span class="k">Affiliation</span></div>
        <div class="filter-chips" id="filter-affiliation" style="margin-top:5px;"></div>
      </div>
      <div>
        <div class="detail-cell"><span class="k">Awe walk?</span></div>
        <div class="filter-chips" id="filter-awewalk" style="margin-top:5px;">
          <span class="chip active" data-val="all">All</span>
          <span class="chip" data-val="y">Awe walks only</span>
          <span class="chip" data-val="n">Non-awe walks</span>
        </div>
      </div>
    </div>

    <!-- Detail panel -->
    <div class="detail-panel empty" id="detailPanel">
      <div>Click a point on the map<br>to see details</div>
    </div>

  </div>

  <!-- ── Map ── -->
  <div id="map"></div>

</div>

// ═══════════════════════════════════════════════════════════
// PARSE data into structured objects
// ═══════════════════════════════════════════════════════════
FIELDS = ["lng","lat","name","affiliation","transport","awe_walk","sanctuary","threshold","other","surprise","history","rhythm","where","potential","wol","wol2","wol3","what1","what2","what3","perception1","perception2","perception3","tension1","tension2","tension3","description"],

POINTS = RAW.map(r => {
  const obj = {};
  FIELDS.forEach((f, i) => { obj[f] = r[i] ?? ""; });
  // Normalise: pick first non-empty WOL / perception / tension
  obj.wol_primary = [obj.wol, obj.wol2, obj.wol3].find(v => v && v.trim()) || "other";
  obj.perception   = [obj.perception1, obj.perception2, obj.perception3].find(v => v && v.trim()) || "other";
  obj.tension      = [obj.tension1, obj.tension2, obj.tension3].find(v => v && v.trim()) || "other";
  return obj;
});

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let state = {
  scheme: "wol",
  hiddenValues: new Set(),
  filterAffil: new Set(["gardener","CRA","personal"]),
  filterAweWalk: "all",
  markers: [],
};

// ═══════════════════════════════════════════════════════════
// MAP INIT
// ═══════════════════════════════════════════════════════════
const map = L.map("map", {
  center: [42.374, -71.105],
  zoom: 14,
  zoomControl: true,
});

// Tile layer — CartoDB Positron (light, minimal, works offline once cached)
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: "abcd",
  maxZoom: 19,
}).addTo(map);

// ═══════════════════════════════════════════════════════════
// MARKER UTILS
// ═══════════════════════════════════════════════════════════
function getColor(point) {
  const scheme = SCHEMES[state.scheme];
  const val = (point[scheme.field] || "").trim().toLowerCase();
  return scheme.colors[val] || scheme.colors["other"] || "#999";
}

function isVisible(point) {
  const scheme = SCHEMES[state.scheme];
  const val = (point[scheme.field] || "").trim().toLowerCase();
  if (state.hiddenValues.has(val)) return false;
  if (!state.filterAffil.has(point.affiliation)) return false;
  if (state.filterAweWalk !== "all" && point.awe_walk !== state.filterAweWalk) return false;
  return true;
}

function makeMarker(point) {
  const color = getColor(point);
  const icon = L.divIcon({
    className: "",
    html: `<div class="awe-marker" style="width:11px;height:11px;background:${color};"></div>`,
    iconSize: [11, 11],
    iconAnchor: [5.5, 5.5],
  });
  const m = L.marker([point.lat, point.lng], { icon })
    .addTo(map)
    .on("click", () => showDetail(point));
  return m;
}

// ═══════════════════════════════════════════════════════════
// RENDER MARKERS
// ═══════════════════════════════════════════════════════════
function renderMarkers() {
  // Remove old
  state.markers.forEach(m => map.removeLayer(m));
  state.markers = [];

  let visible = 0;
  POINTS.forEach(p => {
    if (!isVisible(p)) return;
    visible++;
    state.markers.push(makeMarker(p));
  });

  document.getElementById("stat-visible").textContent = visible;
}

// ═══════════════════════════════════════════════════════════
// LEGEND
// ═══════════════════════════════════════════════════════════
function renderLegend() {
  const scheme = SCHEMES[state.scheme];
  const counts = {};
  POINTS.forEach(p => {
    const val = (p[scheme.field] || "").trim().toLowerCase() || "other";
    counts[val] = (counts[val] || 0) + 1;
  });

  const entries = Object.entries(scheme.colors)
    .filter(([k]) => counts[k])
    .sort((a, b) => (counts[b[0]] || 0) - (counts[a[0]] || 0));

  const legend = document.getElementById("legend");
  legend.innerHTML = entries.map(([val, color]) => `
    <div class="legend-item ${state.hiddenValues.has(val) ? "dimmed" : ""}" data-val="${val}">
      <div class="legend-dot" style="background:${color};"></div>
      <span class="legend-label">${val}</span>
      <span class="legend-count">${counts[val] || 0}</span>
    </div>
  `).join("");

  legend.querySelectorAll(".legend-item").forEach(el => {
    el.addEventListener("click", () => {
      const val = el.dataset.val;
      if (state.hiddenValues.has(val)) state.hiddenValues.delete(val);
      else state.hiddenValues.add(val);
      renderLegend();
      renderMarkers();
    });
  });
}

// ═══════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════
function showDetail(point) {
  const panel = document.getElementById("detailPanel");
  panel.classList.remove("empty");

  const scheme = SCHEMES[state.scheme];
  const activeVal = (point[scheme.field] || "").trim().toLowerCase();
  const color = getColor(point);

  const tags = [
    point.wol_primary, point.perception, point.tension,
    point.rhythm, point.where, point.potential,
    point.affiliation,
    point.awe_walk === "y" ? "awe walk" : null,
    point.sanctuary === "y" ? "sanctuary" : null,
  ].filter(Boolean);

  const desc = (point.description || "").replace(/^"|"$/g, "").trim();

  panel.innerHTML = `
    <div class="detail-title">${point.name}</div>
    <div class="detail-tags">
      ${tags.map(t => `<span class="tag ${t === activeVal ? "highlight" : ""}" style="${t === activeVal ? `background:${color}` : ""}">${t}</span>`).join("")}
    </div>
    <div class="detail-grid">
      <div class="detail-cell"><div class="k">What</div><div class="v">${[point.what1, point.what2, point.what3].filter(Boolean).join(", ") || "—"}</div></div>
      <div class="detail-cell"><div class="k">Transport</div><div class="v">${point.transport || "—"}</div></div>
      <div class="detail-cell"><div class="k">Rhythm</div><div class="v">${point.rhythm || "—"}</div></div>
      <div class="detail-cell"><div class="k">Potential</div><div class="v">${point.potential || "—"}</div></div>
    </div>
    ${desc ? `<div class="detail-desc">"${desc}"</div>` : ""}
  `;

  // Pan to point
  map.panTo([point.lat, point.lng]);
}

// ═══════════════════════════════════════════════════════════
// FILTER CHIPS
// ═══════════════════════════════════════════════════════════
function initAffilChips() {
  const container = document.getElementById("filter-affiliation");
  const affiliations = [...new Set(POINTS.map(p => p.affiliation).filter(Boolean))];
  container.innerHTML = affiliations.map(a => `
    <span class="chip active" data-val="${a}">${a}</span>
  `).join("");
  container.querySelectorAll(".chip").forEach(c => {
    c.addEventListener("click", () => {
      const val = c.dataset.val;
      if (state.filterAffil.has(val)) {
        state.filterAffil.delete(val);
        c.classList.remove("active");
      } else {
        state.filterAffil.add(val);
        c.classList.add("active");
      }
      renderMarkers();
    });
  });
}

function initAweWalkChips() {
  document.getElementById("filter-awewalk").querySelectorAll(".chip").forEach(c => {
    c.addEventListener("click", () => {
      document.querySelectorAll("#filter-awewalk .chip").forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      state.filterAweWalk = c.dataset.val;
      renderMarkers();
    });
  });
}

// ═══════════════════════════════════════════════════════════
// COLOR-BY SELECTOR
// ═══════════════════════════════════════════════════════════
document.getElementById("colorBy").addEventListener("change", e => {
  state.scheme = e.target.value;
  state.hiddenValues.clear();
  renderLegend();
  renderMarkers();
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.getElementById("stat-total").textContent = POINTS.length;
document.getElementById("stat-awe-walks").textContent = POINTS.filter(p => p.awe_walk === "y").length;

initAffilChips();
initAweWalkChips();
renderLegend();
renderMarkers();
</script>
